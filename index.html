<div style ="margin: 50px;"> 

 



<div class="accordion" id="accordionExample">
  <div class="card">
    <div class="card-header" id="headingOne">
      <h2 class="mb-0">
        <button class="btn btn-link" type="button" data-toggle="collapse" data-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
          Installation Cost Calculation
        </button>
      </h2>
    </div>

    <div id="collapseOne" class="collapse" aria-labelledby="headingOne" data-parent="#accordionExample">
      <div class="card-body">
        <!-- Form for Cost Calculation-->
                    <form>
            <div class="form-group row">
              <label for="inputNumber" class="col-sm-2 col-form-label">Number of Installations</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="inputNumber" placeholder="Number of Installations">
              </div>
            </div>
            <div class="form-group row">
              <label for="inputCost" class="col-sm-2 col-form-label">Cost per Installation (in €)</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="inputCost" placeholder="Cost in €">
              </div>
            </div>
            <div class="form-group row">
              <div class="col-sm-10">
                <input type="button" class="btn btn-primary" id="signin_button" value="Calculate"></button>
              </div>
            </div>
          </form>
          
          <h3>Vergangene Berechnungen</h3>
          <ul class="list-group" id="calcList">
        </ul>
          
          
        </div>

      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header" id="headingTwo">
      <h2 class="mb-0">
        <button class="btn btn-link collapsed" type="button" data-toggle="collapse" data-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
          Calculate Stored Gross Energy
        </button>
      </h2>
    </div>
    <div id="collapseTwo" class="collapse" aria-labelledby="headingTwo" data-parent="#accordionExample">
      <div class="card-body">
        <!-- Form for Brutto Energieinhalt --> 
        
          <form>
            <div class="form-group row">
              <label for="inputCost" class="col-sm-2 col-form-label">Effieciency Charge Converter</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="wirkungsgrad" placeholder="Effieciency Charge Converter">
              </div>
            </div>

            <div class="form-group row">
              <label for="inputNumber" class="col-sm-2 col-form-label">Loading power (in W)</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="ladeleistung" placeholder="Loading power (in W)">
              </div>
            </div>
            
            <div class="form-group row">
              <label for="inputNumber" class="col-sm-2 col-form-label">Loading duration (in Min.)</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="ladedauer" placeholder="Loading duration (in Min.)">
              </div>
            </div>
            <div class="form-group row">
              <div class="col-sm-10">
                <input type="button" class="btn btn-primary" id="submit_energieinhalt" value="Calculate"></button>
              </div>
            </div>
          </form>
          <h3>Past Calculations</h3>
          <ul class="list-group" id="energieinhaltList">
        </ul>
          
        
        
              </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header" id="headingThree">
      <h2 class="mb-0">
        <button class="btn btn-link collapsed" type="button" data-toggle="collapse" data-target="#collapseThree" aria-expanded="false" aria-controls="collapseThree">
          Installation Analyzer
        </button>
      </h2>
    </div>
    <div id="collapseThree" class="collapse" aria-labelledby="headingThree" data-parent="#accordionExample">
      <div class="card-body">
        <form>
            <div class="form-group row">
              <label for="instStorage" class="col-sm-2 col-form-label">Storage in MWh</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="instStorage" placeholder="Storage in MWh">
              </div>
            </div>

            <div class="form-group row">
              <label for="instMasse" class="col-sm-2 col-form-label">Mass in KG</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="instMasse" placeholder="Mass in KG">
              </div>
            </div>
            
            <div class="form-group row">
              <label for="instPrice" class="col-sm-2 col-form-label">Price in €</label>
              <div class="col-sm-10">
                <input type="number" class="form-control" id="instPrice" placeholder="Price in €">
              </div>
            </div>
             <div class="form-group row">
              <label for="instDischarge" class="col-sm-2 col-form-label">Self-Discharge (in % per hour)</label>
              <div class="col-sm-10">
                <input type="number"class="form-control" id="instDischarge" placeholder="Self-Discharge (in % per hour)">
              </div>
            </div>
            <div class="form-group row">
              <div class="col-sm-10">
                <input type="button" class="btn btn-primary" id="submit_inst" value="Add Installation"></button>
              </div>
            </div>
            
            <div class="form-group row">
              <div class="col-sm-10">
                <input type="button" class="btn btn-primary" id="submitDuration" value="Identify Most Enduring Installation"></button>
              </div>
            </div>
            
            <div class="form-group row">
              <div class="col-sm-10">
                <input type="button" class="btn btn-primary" id="submitCheapest" value="Identify Cheapest Installation"></button>
              </div>
            </div>

            
          </form>
          <h3>Added Installations</h3>
          <ul class="list-group" id="installationList">
        </ul>  
        
        
              </div>
    </div>
  </div>
</div>
